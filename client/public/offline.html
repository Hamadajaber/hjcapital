<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HJ Capital — غير متصل</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0f172a;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      margin-bottom: 0.5rem;
    }
    h1 { font-size: 1.5rem; font-weight: 700; color: #f59e0b; }
    p { color: #94a3b8; font-size: 1rem; line-height: 1.6; max-width: 320px; }
    .badge {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 999px;
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; }
    button {
      background: #f59e0b;
      color: #0f172a;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <img src="/manus-storage/hj-icon-192_df7d5e95.png" alt="HJ Capital" class="icon" />
  <h1>HJ Capital</h1>
  <div class="badge"><span class="dot"></span> غير متصل بالإنترنت</div>
  <p>يبدو أنك غير متصل بالإنترنت. تحقق من اتصالك وحاول مرة أخرى.</p>
  <button onclick="window.location.reload()">إعادة المحاولة</button>
</body>
</html>
